<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalSubGate — Global Crypto Gateway</title>
    <style>
        * { box-sizing: border-box; }
        
        body { 
            background: url('bg.jpg') no-repeat center center fixed; 
            background-size: cover; 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            height: 100vh;
            overflow: hidden;
        }

        header {
            width: 100%;
            padding: 10px 25px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(56, 189, 248, 0.3);
            position: fixed;
            top: 0; z-index: 1000;
        }

        .logo-group { display: flex; flex-direction: column; }
        .logo { font-weight: 900; color: #38bdf8; font-size: 18px; letter-spacing: 1px; text-decoration: none; }
        .soft-link { color: #34d399; font-size: 10px; text-decoration: none; font-weight: bold; }

        .nav-actions { display: flex; gap: 10px; align-items: center; }

        /* ОБЩИЙ СТИЛЬ ДЛЯ КНОПОК-ВЫПАДАШЕК */
        .dropdown { position: relative; padding-bottom: 10px; margin-bottom: -10px; }
        
        .nav-btn { 
            background: rgba(56, 189, 248, 0.1); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.3); 
            padding: 8px 15px; border-radius: 10px; font-weight: 700; 
            cursor: pointer; font-size: 12px; transition: 0.3s;
        }
        .nav-btn:hover { background: #38bdf8; color: #0f172a; }

        .pay-btn-main { background: #38bdf8; color: #0f172a; border: none; }

        .dropdown-content {
            display: none; position: absolute; right: 0; top: 100%; 
            background: rgba(21, 32, 51, 0.98); min-width: 320px; padding: 20px;
            border-radius: 20px; border: 1px solid #38bdf8; backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.7); margin-top: 5px;
        }
        .dropdown:hover .dropdown-content { display: block; }

        /* СТИЛЬ ПЛАШЕК С КОПИРОВАНИЕМ (КАК У КОШЕЛЬКА) */
        .copy-bar {
            background: rgba(15, 23, 42, 0.6); padding: 8px 12px; border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1); display: flex; 
            align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px;
        }
        .copy-bar:last-child { margin-bottom: 0; }
        .bar-label { font-size: 9px; color: #94a3b8; text-transform: uppercase; font-weight: 800; min-width: 50px; }
        .bar-value { font-family: monospace; font-size: 11px; color: #38bdf8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-copy-btn { 
            background: #34d399; color: #0f172a; border: none; padding: 4px 8px; 
            border-radius: 6px; font-size: 9px; font-weight: 900; cursor: pointer; transition: 0.2s;
        }
        .mini-copy-btn:active { transform: scale(0.9); }

        .hero {
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; padding: 20px;
        }
        .hero h1 { font-size: clamp(40px, 8vw, 72px); margin: 0; color: white; text-shadow: 0 5px 25px rgba(0,0,0,0.5); font-weight: 900; }
        .hero p { font-size: clamp(14px, 2vw, 18px); color: #cbd5e1; max-width: 650px; margin-top: 15px; line-height: 1.5; }

        /* ВНУТРЕННОСТИ ШЛЮЗА */
        .total-box { text-align: center; padding: 15px; background: rgba(56, 189, 248, 0.1); border-radius: 12px; border: 1px solid rgba(56, 189, 248, 0.2); }
        select, input { width: 100%; padding: 10px; background: #0b121f; border: 1px solid #334155; color: white; border-radius: 8px; margin-bottom: 12px; outline: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo-group">
            <a href="#" class="logo">DigitalSubGate</a>
            <a href="https://github.com" target="_blank" class="soft-link">🎁 WIN TICK PROJECT</a>
        </div>

        <div class="nav-actions">
            <!-- ВЫПАДАЮЩИЕ КОНТАКТЫ -->
            <div class="dropdown">
                <button class="nav-btn">CONTACTS ▼</button>
                <div class="dropdown-content">
                    <!-- Wallet -->
                    <div class="copy-bar">
                        <span class="bar-label">Wallet</span>
                        <span class="bar-value">0xC888...4434</span>
                        <button class="mini-copy-btn" onclick="copyTxt('0xC8880cF7eE8b1C35Cc08e67Bde17AbF70E554434', this)">COPY</button>
                    </div>
                    <!-- Discord -->
                    <div class="copy-bar">
                        <span class="bar-label">Discord</span>
                        <span class="bar-value">digitalsubgate</span>
                        <button class="mini-copy-btn" onclick="copyTxt('digitalsubgate', this)">COPY</button>
                    </div>
                    <!-- Session -->
                    <div class="copy-bar">
                        <span class="bar-label">Session</span>
                        <span class="bar-value">059a07...884c14</span>
                        <button class="mini-copy-btn" onclick="copyTxt('059a0732cbb5c44df2ad7665c55ebaff0c80ea04f0d1f4a614ec466b7b6e884c14', this)">COPY</button>
                    </div>
                    <!-- Email -->
                    <div class="copy-bar">
                        <span class="bar-label">Email</span>
                        <span class="bar-value">DigitalSubGate@proton.me</span>
                        <button class="mini-copy-btn" onclick="copyTxt('DigitalSubGate@proton.me', this)">COPY</button>
                    </div>
                </div>
            </div>

            <!-- ПЛАТЕЖНЫЙ ШЛЮЗ -->
            <div class="dropdown">
                <button class="nav-btn pay-btn-main">QUICK PAY ▼</button>
                <div class="dropdown-content">
                    <select id="service" onchange="updatePrice()">
                        <option value="20">ChatGPT Plus ($20)</option>
                        <option value="30">Midjourney ($30)</option>
                        <option value="60">Adobe Cloud ($60)</option>
                        <option value="0">Custom Amount</option>
                    </select>
                    <input type="number" id="customAmount" placeholder="Enter USD" style="display:none;" oninput="updatePrice()">
                    <div class="total-box">
                        <div style="font-size: 10px; color: #94a3b8; margin-bottom: 5px;">TOTAL TO SEND</div>
                        <div style="font-size: 28px; font-weight: 900; color: #34d399;"><span id="finalPrice">36.00</span> USDT</div>
                        <div style="font-size: 9px; color: #38bdf8; margin-top: 5px;">Network: BEP-20 (BNB Chain)</div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="hero">
        <h1>Premium Services</h1>
        <p>Your gateway to global digital subscriptions. Fast, secure, and powered by crypto.</p>
    </div>

    <script>
        function updatePrice() {
            const s = document.getElementById('service');
            const c = document.getElementById('customAmount');
            c.style.display = (s.value === "0") ? "block" : "none";
            let val = (s.value === "0") ? c.value : s.value;
            let res = (parseFloat(val) || 0);
            if (res > 0) res += 16;
            document.getElementById('finalPrice').innerText = res.toFixed(2);
        }

        function copyTxt(text, btn) {
            navigator.clipboard.writeText(text);
            const originalText = btn.innerText;
            btn.innerText = "DONE!";
            btn.style.background = "#38bdf8";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "#34d399";
            }, 1500);
        }

        window.onload = updatePrice;
    </script>
</body>
</html>
