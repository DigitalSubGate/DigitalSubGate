<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalSubGate — Global Crypto Gateway</title>
    <style>
        * { box-sizing: border-box; }
        
        body { 
            /* Используйте ваше точное имя файла картинки */
            background: url('background.png') no-repeat center center fixed; 
            background-size: cover; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px; 
            margin: 0; 
        }

        /* Убираем темную пелену, оставляем только легкий градиент снизу для глубины */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.2), rgba(15, 23, 42, 0.5));
            z-index: -1;
        }
        
        .card { 
            /* Стеклянная прозрачность */
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(15px); /* Сильное размытие фона под карточкой */
            -webkit-backdrop-filter: blur(15px);
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); 
            width: 100%; 
            max-width: 380px; /* Чуть уже, чтобы видеть больше фона */
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        
        h2 { color: #38bdf8; text-align: center; margin: 0; font-weight: 800; font-size: 24px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .subtitle { font-size: 10px; color: #cbd5e1; text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1.5px; }
        
        label { display: block; margin: 15px 0 8px; font-size: 13px; color: #e2e8f0; font-weight: 600; }
        
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 23, 42, 0.8); color: white; font-size: 14px; outline: none; }
        
        .result { margin-top: 20px; padding: 15px; background: rgba(56, 189, 248, 0.1); border-radius: 16px; text-align: center; border: 1px solid rgba(56, 189, 248, 0.2); }
        .price { font-size: 32px; font-weight: 900; color: #34d399; text-shadow: 0 0 15px rgba(52, 211, 153, 0.4); }
        
        .wallet-box { margin-top: 25px; }
        .data-text { font-size: 9px; background: rgba(15, 23, 42, 0.9); padding: 10px; border-radius: 10px; border: 1px dashed #38bdf8; color: #38bdf8; margin-bottom: 12px; }
        
        .btn { 
            display: block; width: 100%; background: #38bdf8; color: #0f172a; text-align: center; 
            padding: 14px; border-radius: 12px; text-decoration: none; font-weight: 800; 
            margin-top: 15px; font-size: 12px; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }
        
        .free-tools { margin-top: 20px; padding: 15px; background: rgba(255, 255, 255, 0.05); border-radius: 16px; text-align: center; }
        .tool-link { color: #34d399; text-decoration: none; font-size: 11px; font-weight: 700; border: 1px solid #34d399; padding: 6px 15px; border-radius: 8px; }

        .footer-note { font-size: 9px; color: #94a3b8; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h2>DigitalSubGate</h2>
        <div class="subtitle">Premium Digital Logistics 🌐</div>
        
        <label>Select Service:</label>
        <select id="service" onchange="updatePrice()">
            <option value="20">ChatGPT Plus Premium ($20)</option>
            <option value="30">Midjourney Standard ($30)</option>
            <option value="60">Adobe Creative Cloud ($60)</option>
            <option value="15">PlayStation Plus Extra ($15)</option>
            <option value="0">Manual Amount ($)</option>
        </select>
        
        <input type="number" id="customAmount" placeholder="Enter amount" style="display:none; margin-top:10px;" oninput="updatePrice()">

        <div class="result">
            <div class="price" id="finalPrice">...</div>
        </div>

        <div class="wallet-box">
            <div class="data-text">0xC8880cF7eE8b1C35Cc08e67Bde17AbF70E554434</div>
            <div class="data-text">digitalsubgate (Discord)</div>
        </div>
        
        <a href="https://discord.com" target="_blank" class="btn">OPEN DISCORD</a>

        <div class="free-tools">
            <p style="font-size: 10px; margin-bottom: 10px;">WinTick Alarm Clock Project</p>
            <a href="https://github.com" target="_blank" class="tool-link">GITHUB</a>
        </div>

        <div class="footer-note">* USDT BEP-20 only</div>
    </div>

    <script>
        function updatePrice() {
            const s = document.getElementById('service');
            const c = document.getElementById('customAmount');
            c.style.display = (s.value === "0") ? "block" : "none";
            let val = (s.value === "0") ? c.value : s.value;
            let res = (parseFloat(val) || 0) + (parseFloat(val) > 0 ? 16 : 0);
            document.getElementById('finalPrice').innerText = res.toFixed(2) + " USDT";
        }
        window.onload = updatePrice;
    </script>
</body>
</html>
