<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalSubGate — Global Crypto Gateway</title>
    <style>
        * { box-sizing: border-box; }
        
        body { 
            /* ЗАМЕНИТЕ bg.jpg НА ВАШЕ ИМЯ ФАЙЛА */
            background: url('background.png') no-repeat center center fixed; 
            background-size: cover; 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            height: 100vh;
            overflow: hidden; /* Чтобы не было лишней прокрутки */
        }

        /* ШАПКА */
        header {
            width: 100%;
            padding: 10px 30px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(56, 189, 248, 0.3);
            position: fixed;
            top: 0; z-index: 1000;
        }

        .logo-group { display: flex; flex-direction: column; }
        .logo { font-weight: 900; color: #38bdf8; font-size: 18px; letter-spacing: 1px; }
        .soft-link { color: #34d399; font-size: 10px; text-decoration: none; font-weight: bold; margin-top: 2px; }
        .soft-link:hover { text-decoration: underline; }

        .nav-actions { display: flex; gap: 15px; align-items: center; }

        /* ВЫПАДАЮЩИЙ ШЛЮЗ */
        .gateway-dropdown { position: relative; }
        .pay-btn { background: #38bdf8; color: #0f172a; border: none; padding: 8px 18px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 13px; }
        
        .gateway-content {
            display: none; position: absolute; right: 0; top: 45px; 
            background: rgba(30, 41, 59, 0.95); min-width: 300px; padding: 20px;
            border-radius: 20px; border: 1px solid #38bdf8; backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .gateway-dropdown:hover .gateway-content { display: block; }

        /* Кнопки связи */
        .icon-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 12px; border-radius: 10px; cursor: pointer; text-decoration: none; font-size: 12px; font-weight: 600; }
        .icon-btn:hover { background: rgba(56, 189, 248, 0.2); border-color: #38bdf8; }

        /* КОШЕЛЕК И КОПИРОВАНИЕ */
        .wallet-bar {
            background: rgba(15, 23, 42, 0.8); padding: 8px 15px; border-radius: 12px;
            border: 1px solid rgba(52, 211, 153, 0.3); display: flex; align-items: center; gap: 10px;
        }
        .wallet-address { font-family: monospace; font-size: 11px; color: #34d399; }
        .copy-btn { background: #34d399; color: #0f172a; border: none; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; cursor: pointer; }

        /* ТЕКСТ В ЦЕНТРЕ */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.05) 0%, transparent 70%);
        }
        .hero h1 { font-size: 64px; margin: 0; color: white; text-shadow: 0 0 30px rgba(56, 189, 248, 0.5); font-weight: 900; }
        .hero p { font-size: 18px; color: #cbd5e1; max-width: 600px; line-height: 1.6; margin-top: 10px; }

        /* Стили внутри шлюза */
        .gw-label { display: block; font-size: 10px; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; }
        select, input { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; margin-bottom: 15px; outline: none; }
        .total-box { text-align: center; padding: 15px; background: rgba(56, 189, 248, 0.1); border-radius: 12px; }
        .total-price { font-size: 28px; font-weight: 900; color: #34d399; }
    </style>
</head>
<body>

    <header>
        <div class="logo-group">
            <div class="logo">DigitalSubGate</div>
            <a href="https://github.com" target="_blank" class="soft-link">🎁 WIN TICK PROJECT</a>
        </div>

        <div class="nav-actions">
            <div class="wallet-bar">
                <span class="wallet-address" id="walletAddr">0xC888...4434</span>
                <button class="copy-btn" onclick="copyWallet()">COPY</button>
            </div>

            <a href="https://discord.com" target="_blank" class="icon-btn">DISCORD</a>
            <a href="mailto:DigitalSubGate@proton.me" class="icon-btn">EMAIL</a>

            <div class="gateway-dropdown">
                <button class="pay-btn">QUICK PAY ▼</button>
                <div class="gateway-content">
                    <span class="gw-label">Choose Service</span>
                    <select id="service" onchange="updatePrice()">
                        <option value="20">ChatGPT Plus ($20)</option>
                        <option value="30">Midjourney ($30)</option>
                        <option value="60">Adobe Cloud ($60)</option>
                        <option value="0">Custom Amount</option>
                    </select>
                    <input type="number" id="customAmount" placeholder="Enter USD" style="display:none;" oninput="updatePrice()">
                    
                    <div class="total-box">
                        <span class="gw-label">Total to Transfer (USDT)</span>
                        <div class="total-price" id="finalPrice">36.00</div>
                        <div style="font-size: 9px; color: #94a3b8; margin-top: 5px;">Network: BEP-20 (BNB Chain)</div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="hero">
        <h1>Premium Services</h1>
        <p>Your gateway to global digital subscriptions. Fast, secure, and powered by crypto. Explore our automated logistics solution.</p>
    </div>

    <script>
        function updatePrice() {
            const s = document.getElementById('service');
            const c = document.getElementById('customAmount');
            c.style.display = (s.value === "0") ? "block" : "none";
            let val = (s.value === "0") ? c.value : s.value;
            let res = (parseFloat(val) || 0);
            if (res > 0) res += 16;
            document.getElementById('finalPrice').innerText = res.toFixed(2);
        }

        function copyWallet() {
            const fullAddress = "0xC8880cF7eE8b1C35Cc08e67Bde17AbF70E554434";
            navigator.clipboard.writeText(fullAddress);
            const btn = document.querySelector('.copy-btn');
            btn.innerText = "DONE!";
            btn.style.background = "#38bdf8";
            setTimeout(() => {
                btn.innerText = "COPY";
                btn.style.background = "#34d399";
            }, 2000);
        }

        window.onload = updatePrice;
    </script>
</body>
</html>
